---
layout: default
---
<div class="wrap page-head">
  <p class="crumb"><a href="{{ '/blog/' | relative_url }}">~/blog</a> / {{ page.slug | default: page.title | slugify }}</p>
</div>
<div class="wrap">
  <article class="prose">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      <span>{{ page.date | date: "%Y-%m-%d" }}</span>
      {% if page.tags %}<span class="tag-inline">{% for t in page.tags %}#{{ t }} {% endfor %}</span>{% endif %}
    </div>
    {{ content }}
  </article>
  <div class="post-nav">
    <a href="{{ '/blog/' | relative_url }}">← all posts</a>
  </div>
</div>
